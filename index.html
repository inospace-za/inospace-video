<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inospace</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0a0203;
    overflow: hidden;
  }
  iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>
</head>
<body>
  <iframe
    src="https://www.youtube.com/embed/Uji_1I3rXeI?autoplay=1&mute=1&loop=1&playlist=Uji_1I3rXeI&controls=0&rel=0&showinfo=0&modestbranding=1&playsinline=1"
    allow="autoplay; encrypted-media"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>
</body>
</html>
